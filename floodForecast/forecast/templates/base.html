{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Flood Forecast Mark 1{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar__logo">
            <div class="sidebar__logo-icon">
                <i class="bi bi-water"></i>
            </div>
            <div class="sidebar__logo-text">
                <span class="sidebar__logo-title">FLOOD</span>
                <span class="sidebar__logo-sub">FORECAST MK.1</span>
            </div>
        </div>

        <nav class="sidebar__nav">
            <a href="{% url 'dashboard' %}" class="sidebar__link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'history' %}" class="sidebar__link {% if request.resolver_match.url_name == 'history' %}active{% endif %}">
                <i class="bi bi-calendar3"></i>
                <span>History</span>
            </a>
            <a href="{% url 'about' %}" class="sidebar__link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">
                <i class="bi bi-info-circle"></i>
                <span>About</span>
            </a>
        </nav>

        <div class="sidebar__footer">
            <div class="sidebar__status">
                <span class="sidebar__status-dot"></span>
                <span class="sidebar__status-text">System Online</span>
            </div>
            <p class="sidebar__version">v1.0.0 — XGBoost</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
